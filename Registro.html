<!DOCTYPE html>
<html lang="es">
<head>
    <link type="image/x-icon" rel="shortcut icon" href="Imagenes/Gymrat.ico" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulario de registro seguro para nuevos usuarios de Suplementos Gym Pro.">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:;">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="css/estiloRegistro.css">
</head>
<body>
    <!-- Página de registro de usuario con pestañas para registrarse o iniciar sesión -->
    <main>
        <!-- Selector de pestañas para alternar entre formulario de registro e inicio de sesión -->
        <div class="form-tabs" role="tablist" aria-label="Selector de formulario">
            <button type="button" id="tabRegistro" class="tab-button active" role="tab" aria-selected="true" aria-controls="registro-section">Registrarse</button>
            <button type="button" id="tabLogin" class="tab-button" role="tab" aria-selected="false" aria-controls="login-section">Iniciar sesión</button>
        </div>

        <section id="registro-section" role="tabpanel" aria-labelledby="registro-title" class="form-section active">
            <!-- Sección de registro con campos para nombre, email y contraseña -->
            <form id="registroForm" novalidate autocomplete="off">
                <h2 id="registro-title">Registro de Usuario</h2>
                <p class="intro">Completa tus datos para inscribirte de forma segura.</p>
                <fieldset>
                    <legend>Información personal</legend>
                    <!-- Campo para ingresar el nombre completo del usuario registrado. -->
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre Completo"
                               required maxlength="50" pattern="[A-Za-zÀ-ÿ\s'-]+"
                               autocomplete="name">
                    </div>
                <div class="form-group">
                    <!-- Campo para ingresar el correo electrónico del usuario. -->
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="Correo Electrónico"
                           required maxlength="254" autocomplete="email">
                </div>
                <div class="form-group">
                    <!-- Campo para ingresar una contraseña segura con mínimo 8 caracteres. -->
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Contraseña"
                           required minlength="8" maxlength="128" autocomplete="new-password">
                </div>
               <div class="form-group">
                    <!-- Confirmación de la contraseña para evitar errores de tipeo. -->
                    <label for="confirmPassword">Confirmar contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirmar contraseña"
                           required minlength="8" maxlength="128" autocomplete="new-password">
                </div>
            </fieldset>
            <button type="submit">Registrarse</button>
            <p id="mensaje" class="form-message" role="status" aria-live="polite"></p>
        </form>
        </section>

        <section id="login-section" role="tabpanel" aria-labelledby="login-title" class="form-section">
            <!-- Sección de inicio de sesión para usuarios ya registrados -->
            <form id="loginForm" novalidate autocomplete="off">
                <h2 id="login-title">Iniciar sesión</h2>
                <p class="intro">Ingresa tus datos si ya tienes una cuenta registrada.</p>
                <div class="form-group">
                    <label for="loginEmail">Correo electrónico</label>
                    <input type="email" id="loginEmail" name="loginEmail" placeholder="usuario@ejemplo.com" required maxlength="254" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <input type="password" id="loginPassword" name="loginPassword" placeholder="Contraseña" required minlength="8" maxlength="128" autocomplete="current-password">
                </div>
                <button type="submit">Acceder</button>
                <p id="loginMessage" class="form-message" role="status" aria-live="polite"></p>
            </form>
        </section>
    </main>
    <script src="Js/app.js"></script>
</body>
</html>
